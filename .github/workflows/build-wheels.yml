name: build-wheels

on:
  push:
    branches: [main]
    tags: ['v*']           # tag like v0.1.0 to trigger PyPI publish
  pull_request:
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────────────────────
  # Build colbandit wheels (C kernel bundled as colbandit._kernel).
  # cibuildwheel reads the [tool.cibuildwheel] section in pyproject.toml.
  # ───────────────────────────────────────────────────────────────
  wheels:
    name: wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-13, windows-latest]
        # macos-14 = Apple-Silicon (arm64), macos-13 = Intel (x86_64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: pypa/cibuildwheel@v2.21
        with:
          output-dir: wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ───────────────────────────────────────────────────────────────
  # Build the sdist on Linux only.
  # ───────────────────────────────────────────────────────────────
  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install build
      - run: python -m build --sdist .
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ───────────────────────────────────────────────────────────────
  # On v* tag: publish wheels + sdist to PyPI (uses PYPI_API_TOKEN secret).
  # ───────────────────────────────────────────────────────────────
  publish:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/colbandit
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: all-artifacts }
      - name: Stage wheels + sdist
        run: |
          mkdir -p dist
          find all-artifacts -name '*.whl'    -exec cp -v {} dist/ \;
          find all-artifacts -name '*.tar.gz' -exec cp -v {} dist/ \;
          ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # repository-url: https://test.pypi.org/legacy/   # uncomment for TestPyPI dry runs
          skip-existing: true
