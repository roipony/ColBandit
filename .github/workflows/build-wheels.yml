name: build-wheels

on:
  push:
    branches: [main]
    tags: ['v*']           # tag like v0.1.0 to trigger PyPI publish
  pull_request:
  workflow_dispatch:

jobs:
  # ───────────────────────────────────────────────────────────────
  # 1) Build numkong (Rust + C extension) wheels per (OS × arch × Py)
  #    cibuildwheel reads native/numkong/pyproject.toml's [tool.cibuildwheel]
  # ───────────────────────────────────────────────────────────────
  numkong-wheels:
    name: numkong / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, macos-13, windows-latest]
        # macos-14 = Apple-Silicon (arm64), macos-13 = Intel (x86_64)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: pypa/cibuildwheel@v2.21
        with:
          package-dir: native/numkong
          output-dir:  wheelhouse
        env:
          CIBW_BUILD:  "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP:   "pp* *-musllinux* *-win32 *-manylinux_i686"
          CIBW_BEFORE_BUILD_MACOS: "brew install libomp"
      - uses: actions/upload-artifact@v4
        with:
          name: numkong-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # ───────────────────────────────────────────────────────────────
  # 2) Build colbandit (pure-Python wheel + sdist)
  # ───────────────────────────────────────────────────────────────
  colbandit-dist:
    name: colbandit (pure python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install build
      - run: python -m build --wheel --sdist .
      - uses: actions/upload-artifact@v4
        with:
          name: colbandit-dist
          path: dist/*

  # ───────────────────────────────────────────────────────────────
  # 3) On v* tag: publish everything to PyPI (uses PYPI_API_TOKEN secret)
  # ───────────────────────────────────────────────────────────────
  publish:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [numkong-wheels, colbandit-dist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/colbandit
    permissions:
      id-token: write   # for trusted publishing if you switch to that later
    steps:
      - uses: actions/download-artifact@v4
        with: { path: all-artifacts }
      - name: Stage wheels + sdists
        run: |
          mkdir -p dist
          find all-artifacts -name '*.whl'    -exec cp -v {} dist/ \;
          find all-artifacts -name '*.tar.gz' -exec cp -v {} dist/ \;
          ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # repository-url: https://test.pypi.org/legacy/   # uncomment for TestPyPI dry runs
          skip-existing: true
